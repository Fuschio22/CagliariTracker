<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Cagliari - Serie A</title>
    <style>
        :root {
            --cagliari-red: #c8102e;
            --cagliari-blue: #003da5;
            --bg-primary: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            padding-bottom: 100px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--cagliari-red);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--cagliari-red), var(--cagliari-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-block;
            color: var(--cagliari-red);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .section-title {
            font-size: 20px;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .match-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--cagliari-red);
        }
        .match-card.live {
            border-left-color: #ff3366;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .team.away {
            justify-content: flex-end;
        }
        .score {
            font-size: 20px;
            font-weight: 800;
            color: var(--cagliari-red);
            min-width: 60px;
            text-align: center;
        }
        .score.live {
            color: #ff3366;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--cagliari-red);
            border-color: var(--cagliari-red);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 Calendario Cagliari</h1>
    </div>
    
    <a href="index.html" class="back-link">← Torna alla Home</a>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('upcoming')">Prossime</div>
        <div class="tab" onclick="showTab('recent')">Recenti</div>
        <div class="tab" onclick="showTab('all')">Tutte</div>
    </div>
    
    <div id="matchesContainer">
        <div class="loading">Caricamento...</div>
    </div>

    <script>
        const API_KEY = 'cdd1a87ea50a411880249e70138e0233';
        const API_BASE = 'https://api.football-data.org/v4';
        const CAGLIARI_ID = 115;
        
        let allMatches = [];

        async function loadMatches() {
            try {
                const response = await fetch(`${API_BASE}/teams/${CAGLIARI_ID}/matches?season=2024`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await response.json();
                allMatches = data.matches || [];
                showTab('upcoming');
            } catch (error) {
                document.getElementById('matchesContainer').innerHTML = '<div class="loading">Errore nel caricamento</div>';
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            let filtered = [];
            const now = new Date();
            
            if (tab === 'upcoming') {
                filtered = allMatches.filter(m => new Date(m.utcDate) > now && m.status === 'SCHEDULED');
            } else if (tab === 'recent') {
                filtered = allMatches.filter(m => m.status === 'FINISHED').slice(-5);
            } else {
                filtered = allMatches;
            }
            
            renderMatches(filtered);
        }

        function renderMatches(matches) {
            if (matches.length === 0) {
                document.getElementById('matchesContainer').innerHTML = '<div class="loading">Nessuna partita</div>';
                return;
            }
            
            const html = matches.map(match => {
                const matchDate = new Date(match.utcDate);
                const isLive = ['LIVE', 'IN_PLAY', 'PAUSED'].includes(match.status);
                const isFinished = match.status === 'FINISHED';
                const isHome = match.homeTeam.id === CAGLIARI_ID;
                
                let scoreText = matchDate.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                if (isFinished) {
                    scoreText = `${match.score.fullTime.home} - ${match.score.fullTime.away}`;
                } else if (isLive) {
                    scoreText = `${match.score.fullTime.home || 0} - ${match.score.fullTime.away || 0}`;
                }
                
                return `
                    <div class="match-card ${isLive ? 'live' : ''}">
                        <div class="match-header">
                            <span>${match.competition.name}</span>
                            <span>${isLive ? '🔴 LIVE ' + (match.minute || '') + "'" : matchDate.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                        </div>
                        <div class="match-teams">
                            <div class="team">
                                <span>${isHome ? '🔴🔵' : '⚽'}</span>
                                <span>${match.homeTeam.name}</span>
                            </div>
                            <div class="score ${isLive ? 'live' : ''}">${scoreText}</div>
                            <div class="team away">
                                <span>${match.awayTeam.name}</span>
                                <span>${!isHome ? '🔵' : '⚽'}</span>
                            </div>
                        </div>
                        ${match.venue ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">📍 ${match.venue}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('matchesContainer').innerHTML = html;
        }

        loadMatches();
        setInterval(loadMatches, 60000);
    </script>
</body>
</html>
